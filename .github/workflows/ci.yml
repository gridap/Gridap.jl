name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - 'CONTRIBUTING.md'
      - 'CODE_OF_CONDUCT.md'
      - 'LICENSE.md'
      - 'README.md'
      - 'NEWS.md'
      - 'ADMINISTRATORS'
      - 'benchmark/**'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - 'CONTRIBUTING.md'
      - 'CODE_OF_CONDUCT.md'
      - 'LICENSE.md'
      - 'README.md'
      - 'NEWS.md'
      - 'ADMINISTRATORS'
      - 'benchmark/**'
      - 'docs/**'
  workflow_dispatch: # Allow manual triggering of the workflow from the Actions tab

# Cancel redundant CI runs: always for PRs, never for pushes to master
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  test: # Main CI tests
    name: ${{ matrix.testcase || 'all' }} - ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    env:
      DO_COVERAGE: ${{ matrix.version == 'lts' && matrix.os == 'ubuntu-latest' && matrix.arch == 'x64' }}
    strategy:
      fail-fast: false
      matrix: # Split testcases run in parallel on linux
        version:
          - 'lts'
          - '1'
        os:
          - ubuntu-latest
        arch:
          - x64
        testcase:
          - unit-basics
          - unit-fields
          - unit-referencefes
          - unit-geometry
          - unit-celldata
          - unit-visualization
          - unit-fespaces-1
          - unit-fespaces-2
          - unit-multifield
          - unit-odes
          - unit-adaptivity
          - drivers
        include: # LTS-only on macos/windows/x86
          - version: 'lts'
            os: macos-latest
            arch: aarch64
          - version: 'lts'
            os: windows-latest
            arch: x64
          - version: 'lts'
            os: ubuntu-latest
            arch: x86
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        with:
          coverage: ${{ env.DO_COVERAGE }}
        env:
          TESTCASE: ${{ matrix.testcase || 'all' }}

      - uses: julia-actions/julia-processcoverage@v1
        if: ${{ env.DO_COVERAGE }}
      - uses: codecov/codecov-action@v5
        if: ${{ env.DO_COVERAGE }}
        with:
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ matrix.testcase || 'tests' }}

  extensions:
    name: Extensions ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1'
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - run: |
          julia --color=yes --project=. --depwarn=yes -e 'using Pkg; Pkg.instantiate()'
          julia --color=yes --project=. --depwarn=yes -e 'using Pkg; Pkg.add(["Test", "TikzPictures"])'
          julia --color=yes --project=. --code-coverage=user --depwarn=yes -e 'include("test/ExtensionTests/runtests.jl")'
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v5
        with:
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: extensions
